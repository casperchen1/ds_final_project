services:
  web:
    build: .
    ports:
      - "8080:8000"
    # 💡 核心神技：掛載 Volume 實現即時更新
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=mysql+aiomysql://root:password@db:3306/ds_final_project
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ds_final_project
    ports:
      - "3306:3306"
    # 確保資料庫刪掉重啟後，資料不會消失
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: